version: "3.8"

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiinterview
      POSTGRES_PASSWORD: aiinterview123
      POSTGRES_DB: aiinterview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiinterview"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-interview-redis
    restart: unless-stopped
    command: redis-server --requirepass aiinterview123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aiinterview123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # MinIO（S3 兼容对象存储）
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ai-interview-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aiinterview
      MINIO_ROOT_PASSWORD: aiinterview123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  minio-init:
    image: minio/mc:latest
    container_name: ai-interview-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 aiinterview aiinterview123;
      mc mb --ignore-existing local/ai-interview;
      echo 'MinIO bucket initialized';
      "
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-interview-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aiinterview
      RABBITMQ_DEFAULT_PASS: aiinterview123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management Console
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  ai-interview-net:
    driver: bridge
