version: "3.8"

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiinterview
      POSTGRES_PASSWORD: aiinterview123
      POSTGRES_DB: aiinterview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiinterview"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-interview-redis
    restart: unless-stopped
    command: redis-server --requirepass aiinterview123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aiinterview123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # MinIO（S3 兼容对象存储，业务数据）
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ai-interview-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aiinterview
      MINIO_ROOT_PASSWORD: aiinterview123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  minio-init:
    image: minio/mc:latest
    container_name: ai-interview-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 aiinterview aiinterview123;
      mc mb --ignore-existing local/ai-interview;
      mc mb --ignore-existing local/milvus;
      echo 'MinIO buckets initialized';
      "
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-interview-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aiinterview
      RABBITMQ_DEFAULT_PASS: aiinterview123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management Console
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Milvus（向量数据库）【rag profile】
  # 依赖：etcd（元数据） + 业务 MinIO（对象存储，milvus bucket）
  # ─────────────────────────────────────────
  etcd:
    profiles: ["rag"]
    image: quay.io/coreos/etcd:v3.5.14
    container_name: ai-interview-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"   # 4 GiB
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-interview-net

  milvus:
    profiles: ["rag"]
    image: milvusdb/milvus:v2.4.17
    container_name: ai-interview-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000                  # 复用业务 MinIO
      MINIO_ACCESS_KEY_ID: aiinterview
      MINIO_SECRET_ACCESS_KEY: aiinterview123
      MINIO_BUCKET_NAME: milvus                  # 独立 bucket，与业务 ai-interview bucket 隔离
      MINIO_USE_SSL: "false"
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # HTTP/metrics
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully  # bucket 建好再启动
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Elasticsearch（关键词 / 标签检索）【rag profile】
  # ─────────────────────────────────────────
  elasticsearch:
    profiles: ["rag"]
    image: elasticsearch:8.13.4
    container_name: ai-interview-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"   # 本地开发关闭认证；生产环境请开启
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Ollama（本地 LLM / embedding）【ollama profile】
  # 不需要本地模型时可不传 --profile ollama
  # ─────────────────────────────────────────
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: ai-interview-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # 有 GPU 时取消注释以下 deploy 段
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # 知识库采集器（按需运行，非常驻服务）
  # 用法：
  #   docker compose --profile collector build collector
  #   docker compose --profile collector run --rm collector --dry-run --limit 5
  #   docker compose --profile collector run --rm collector --limit 10
  # ─────────────────────────────────────────
  collector:
    profiles: ["collector"]
    build:
      context: .
      dockerfile: Dockerfile.collector
    image: ai-interview-collector:latest
    container_name: ai-interview-collector
    env_file:
      - .env
    environment:
      # 覆盖为容器内地址
      POSTGRES_DSN: postgres://aiinterview:aiinterview123@postgres:5432/aiinterview?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: aiinterview123
      MQ_BROKER_URL: amqp://aiinterview:aiinterview123@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ai-interview-net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  etcd_data:
  milvus_data:
  es_data:
  ollama_data:

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  ai-interview-net:
    driver: bridge
