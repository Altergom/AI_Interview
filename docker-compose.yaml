version: "3.8"

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiinterview
      POSTGRES_PASSWORD: aiinterview123
      POSTGRES_DB: aiinterview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiinterview"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-interview-redis
    restart: unless-stopped
    command: redis-server --requirepass aiinterview123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "aiinterview123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # MinIO（S3 兼容，同时供业务和 Milvus 使用）
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ai-interview-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aiinterview
      MINIO_ROOT_PASSWORD: aiinterview123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # MinIO 初始化：创建业务所需的 Bucket
  minio-init:
    image: minio/mc:latest
    container_name: ai-interview-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 aiinterview aiinterview123;
      mc mb --ignore-existing local/resumes;
      mc mb --ignore-existing local/audio;
      mc mb --ignore-existing local/sft;
      mc mb --ignore-existing local/milvus;
      echo 'MinIO buckets initialized';
      "
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # RabbitMQ
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-interview-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: aiinterview
      RABBITMQ_DEFAULT_PASS: aiinterview123
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management Console
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # etcd（Milvus 依赖）
  # ─────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: ai-interview-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd-data
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # Milvus
  # ─────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: ai-interview-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: aiinterview
      MINIO_SECRET_ACCESS_KEY: aiinterview123
      MINIO_BUCKET_NAME: milvus
      MINIO_USE_SSL: "false"
    ports:
      - "19530:19530"  # Milvus gRPC
      - "9091:9091"    # Milvus HTTP
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - ai-interview-net

  # ─────────────────────────────────────────
  # API（健康检查、日志；后续可扩展为 Hertz 网关）
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-interview-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      LOG_LEVEL: info
      LOG_FORMAT: json
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: postgres://aiinterview:aiinterview123@postgres:5432/aiinterview?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: aiinterview123
      REDIS_DB: "0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ai-interview-net

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  etcd_data:
  milvus_data:

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  ai-interview-net:
    driver: bridge